<!DOCTYPE html>
<html lang="pl" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <title>Rezerwacja sali konferencyjnych</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pikaday/css/pikaday.css">
    <script src="https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"></script>
    {% load static %}
    <script src="{% static 'js/reservation.js' %}"></script>
    
    <style>
        /* Pikaday Dark Theme - DaisyUI Colors */
        .pika-single {
            background: #1a1a1a !important;
            border: 1px solid #404040;
            color: #e5e7eb;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
            opacity: 1 !important;
        }
        
        .pika-title {
            background: #2a2a2a;
            padding: 8px 0;
        }
        
        .pika-label {
            color: #e5e7eb;
            font-weight: 600;
            background: transparent;
        }
        
        .pika-prev, .pika-next {
            background-color: transparent;
            color: #e5e7eb;
            opacity: 0.8;
        }
        
        .pika-prev:hover, .pika-next:hover {
            opacity: 1;
            background: #404040;
            border-radius: 4px;
        }
        
        .pika-table th {
            color: #9ca3af;
            font-weight: 600;
        }
        
        .pika-button {
            color: #e5e7eb;
            background: #2a2a2a;
            border-radius: 4px;
            opacity: 1;
        }
        
        .pika-button:hover {
            background: #404040;
            color: #fff;
            transform: scale(1.05);
        }
        
        .is-today .pika-button {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.2);
            font-weight: bold;
            border: 2px solid rgba(96, 165, 250, 0.5);
        }
        
        .is-selected .pika-button {
            background: #5b21b6 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(91, 33, 182, 0.4), 0 0 12px rgba(91, 33, 182, 0.6);
            font-weight: bold;
            transform: scale(1.1);
        }
        
        .is-selected .pika-button:hover {
            background: #6d28d9 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.5), 0 0 16px rgba(109, 40, 217, 0.8);
        }
        
        .is-disabled .pika-button {
            color: #4b5563;
            background: #1a1a1a;
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .pika-week {
            color: #6b7280;
        }
        
        .pika-table td {
            padding: 2px;
        }
    </style>
</head>

<body class="min-h-screen bg-base-200">

    {% if messages %}
    <div class="toast toast-end z-50">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <nav class="navbar bg-base-300 px-6 shadow">
        <div class="flex-1">
            <a href="/" class="text-xl font-bold">Rezerwacja sali konferencyjnych</a>
        </div>
        <div class="flex-none">
            {% if user.is_authenticated %}
            <a href="/logout/" class="btn btn-error btn-sm">Wyloguj się</a>
            {% else %}
            <a href="/login/" class="btn btn-primary btn-sm">Zaloguj się</a>
            {% endif %}
        </div>
    </nav>

    <main class="p-6">
        {% block content %}
        {% endblock %}
    </main>

</body>

</html>
